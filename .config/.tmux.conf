# correct colors for themes
#set -g default-terminal "screen-256color"
set -g default-terminal "xterm-256color"
#set -g default-terminal "xterm"

# 1 based indexing
set -g base-index 1
set -g renumber-windows on

# scrollback
set -g history-limit 10000
#set -ga terminal-overrides ',screen*:smcup@:rmcup@'
#set -ga terminal-overrides ',xterm*:smcup@:rmcup@'
set -g terminal-overrides 'xterm*:smcup@:rmcup@'

# fix tmux panes inside docker
set -ag terminal-overrides ',*:enacs@:smacs@:rmacs@:acsc@'
set -ag terminal-overrides ',*:cud1=\E[1B'

# rebind pane selection keys, get rid of infuriating "repeat"
bind-key Up select-pane -U
bind-key Down select-pane -D
bind-key Left select-pane -L
bind-key Right select-pane -R

# split window to same directory
#bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# reorder keybinds
bind C-Left swap-window -t -1\; select-window -t -1
bind C-Right swap-window -t +1\; select-window -t +1

# mouse
# messes up click-select-paste
#set -g mode-mouse on
#set -g mouse-select-pane on

# vi
set -g status-keys vi
set -g bell-action any
set -g mode-keys vi
set -g focus-events on

# graphical-terminal title
set -g set-titles on
set -g set-titles-string   '#H:#S-#I-#P #W #T'

# faster commands
set -s escape-time 50

# resize
set -g aggressive-resize on

# dont auto rename
set -g allow-rename off

# Open popup-shell
unbind ?
bind ? display-popup -w 80% -h 80% -E 'tmux list-keys -N | less'
bind C-r display-popup -w 80% -h 60% -d '#{pane_current_path}' -E '/bin/bash'

# default colors
set -g window-status-current-style bg=black,fg=white
set -g pane-active-border-style fg=green,bg=black
set -g pane-border-style fg=white,bg=black
set -g message-style fg=black,bg=green

# color the world
# dev/lab
# set -g window-status-current-style bg=colour12
# set -g pane-active-border-style fg=green
# set -g message-style bg=green
# set -g status-bg green

# int/cat
# set -g window-status-current-style bg=colour12
# set -g pane-active-border-style fg=yellow
# set -g message-style bg=yellow
# set -g status-bg yellow

# prd
# set -g window-status-current-style bg=colour12
# set -g pane-active-border-style fg=red
# set -g message-style bg=red
# set -g status-bg red

# fix home/end keys (for when tmux is setting $TERM to xterm-256color)
bind-key -n Home send Escape "OH"
bind-key -n End send Escape "OF"

# graphical-terminal title
set -g set-titles on
#set -g set-titles-string   '#H:#S-#I-#P #W #T'
set -g set-titles-string   '#S:#W #{pane_current_command} #{pane_current_path}'

# set TERM
#set -g default-terminal "screen-256color"
set -g default-terminal "xterm-256color"

# different sizes and bindings for popup displays
unbind-key ?
bind-key ? display-popup -w 75% -h 75% -E 'tmux list-keys -N | less'
bind-key r display-popup -w 80% -h 60% -d '#{pane_current_path}' -E '/bin/bash'
bind-key C-r display-popup -w 80% -h 60% -d '#{pane_current_path}' -E '/bin/bash'
bind-key t display-popup -w 80% -h 60% -d '#{pane_current_path}' -E '/bin/bash'
bind-key C-t display-popup -w 80% -h 60% -d '#{pane_current_path}' -E '/bin/bash'

